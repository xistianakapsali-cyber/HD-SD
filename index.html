<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Crypto Tracker · Top 50</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #eaeef2;
            padding: 24px 16px 40px;
            min-height: 100vh;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #8b95a9;
            margin-left: 8px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a202a;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px 20px;
            border: 1px solid #2a323f;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }
        .live-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #3bde7c;
            border-radius: 50%;
            animation: pulse-dot 1.6s infinite;
            box-shadow: 0 0 8px #3bde7c88;
        }
        @keyframes pulse-dot {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }
        .last-update {
            color: #a0abbd;
            font-size: 0.9rem;
        }
        .grid-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .grid-controls input {
            background: #232b36;
            border: 1px solid #343f4f;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            width: 200px;
            transition: 0.2s;
        }
        .grid-controls input:focus {
            border-color: #6c8cff;
            background: #1c2532;
        }
        .grid-controls input::placeholder {
            color: #6b7a90;
        }
        .grid-controls button {
            background: #2d3748;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3f4b5e;
        }
        .grid-controls button:hover {
            background: #3f4b62;
            border-color: #6c8cff;
        }
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 18px;
            margin-top: 8px;
        }
        .crypto-card {
            background: #161d27;
            border-radius: 24px;
            padding: 18px 16px 16px;
            border: 1px solid #25303e;
            transition: 0.2s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        .crypto-card:hover {
            border-color: #4c5c72;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .coin-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coin-name h3 {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }
        .coin-symbol {
            background: #27323f;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b6c4db;
            text-transform: uppercase;
        }
        .coin-rank {
            background: #1f2a36;
            color: #8f9db2;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 4px 0 6px;
        }
        .current-price {
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .change-badge {
            font-size: 1rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            background: #1f2a36;
        }
        .change-badge.positive {
            color: #3bde7c;
            background: #1b3a2a;
        }
        .change-badge.negative {
            color: #f87171;
            background: #3e1e24;
        }
        .mini-chart {
            height: 52px;
            margin: 8px 0 4px;
            width: 100%;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8896ae;
            margin-top: 8px;
            border-top: 1px solid #25303e;
            padding-top: 8px;
        }
        .market-cap {
            font-weight: 400;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #7f8da3;
            font-size: 1.2rem;
            background: #131b25;
            border-radius: 40px;
            border: 1px dashed #2f3b4b;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .status-bar { flex-direction: column; align-items: flex-start; }
            .grid-controls { width: 100%; }
            .grid-controls input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📊 Top 50 Crypto
        <small>real-time · live</small>
    </h1>
    <div class="status-bar">
        <div class="status-badge">
            <span class="live-dot"></span>
            <span>Συνδεδεμένο · ανανέωση κάθε 15 δευτ.</span>
        </div>
        <div class="last-update" id="lastUpdateLabel">τελευταία ενημέρωση: —</div>
        <div class="grid-controls">
            <input type="text" id="searchInput" placeholder="Αναζήτηση νομίσματος...">
            <button id="refreshBtn">⟳ Ενημέρωση</button>
        </div>
    </div>
    <div class="crypto-grid" id="cryptoGrid"></div>
</div>

<script>
    (function() {
        // ---------- STATE ----------
        let cryptoData = [];           // όλα τα δεδομένα (50 coins)
        let chartInstances = {};      // αποθήκευση αναφορών Chart.js ανά id

        const grid = document.getElementById('cryptoGrid');
        const searchInput = document.getElementById('searchInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdateLabel = document.getElementById('lastUpdateLabel');

        // ---------- ΒΟΗΘΗΤΙΚΑ ----------
        function formatPrice(price) {
            if (price === undefined || price === null) return 'N/A';
            if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
            if (price >= 0.001) return price.toFixed(5);
            return price.toExponential(4);
        }

        function formatMarketCap(mc) {
            if (!mc) return 'N/A';
            if (mc >= 1e12) return (mc / 1e12).toFixed(2) + 'T';
            if (mc >= 1e9) return (mc / 1e9).toFixed(2) + 'B';
            if (mc >= 1e6) return (mc / 1e6).toFixed(2) + 'M';
            return mc.toString();
        }

        // ---------- ΔΗΜΙΟΥΡΓΙΑ ΜΙΚΡΟΥ ΓΡΑΦΗΜΑΤΟΣ (sparkline) ----------
        function renderMiniChart(canvasId, prices, changePercent) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            // Αν υπάρχει ήδη chart, το καταστρέφουμε
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
                delete chartInstances[canvasId];
            }

            // Αν δεν έχουμε δεδομένα ή έχουν μόνο 1 σημείο, δημιουργούμε ψεύτικα με τάση
            let dataPoints = prices || [];
            if (dataPoints.length < 2) {
                // δημιουργούμε 20 σημεία με μικρή απόκλιση βάσει του changePercent
                const base = 100;
                const trend = changePercent !== undefined && changePercent !== null ? changePercent / 100 : 0;
                const points = 20;
                for (let i = 0; i < points; i++) {
                    const noise = (Math.random() - 0.5) * 3;
                    const val = base + (i / points) * trend * 30 + noise;
                    dataPoints.push(val);
                }
            }

            // Φροντίζουμε να έχουμε τουλάχιστον 2 σημεία
            if (dataPoints.length < 2) {
                dataPoints = [100, 101];
            }

            const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 50);
            const isPositive = changePercent !== undefined && changePercent >= 0;

            gradient.addColorStop(0, isPositive ? '#3bde7c' : '#f87171');
            gradient.addColorStop(0.7, isPositive ? '#3bde7c' : '#f87171');
            gradient.addColorStop(1, isPositive ? '#3bde7c55' : '#f8717155');

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map((_, i) => i),
                    datasets: [{
                        data: dataPoints,
                        borderColor: isPositive ? '#3bde7c' : '#f87171',
                        backgroundColor: gradient,
                        borderWidth: 2.5,
                        pointRadius: 0,
                        tension: 0.2,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: { x: { display: false }, y: { display: false } },
                    animation: { duration: 0 }
                }
            });

            chartInstances[canvasId] = chart;
        }

        // ---------- ΚΑΤΑΣΚΕΥΗ ΚΑΡΤΑΣ ----------
        function buildCard(coin, index) {
            const id = `chart-${coin.id || index}`;
            const change = coin.price_change_percentage_24h ?? 0;
            const isPositive = change >= 0;
            const changeFormatted = (change !== undefined && !isNaN(change)) ? change.toFixed(2) + '%' : '0.00%';

            // Δημιουργούμε έναν πίνακα τιμών για το γράφημα (sparkline)
            // Χρησιμοποιούμε τα δεδομένα sparkline_in_7d (price change) ή δημιουργούμε ψεύτικα
            let sparkData = [];
            if (coin.sparkline_in_7d && coin.sparkline_in_7d.price && Array.isArray(coin.sparkline_in_7d.price)) {
                sparkData = coin.sparkline_in_7d.price.slice(-25); // τελευταία 25 σημεία
            } else {
                // δημιουργούμε συνθετικά σημεία βάσει της ποσοστιαίας μεταβολής
                const basePrice = coin.current_price || 100;
                const points = 20;
                const trend = (change / 100) * 0.8;
                for (let i = 0; i < points; i++) {
                    const noise = (Math.random() - 0.5) * 2;
                    const val = basePrice * (1 + (i / points) * trend + noise * 0.01);
                    sparkData.push(val);
                }
            }

            // Αν η sparkData είναι πολύ μικρή, την συμπληρώνουμε
            if (sparkData.length < 2) {
                sparkData = [100, 101];
            }

            return `
                <div class="crypto-card" data-coin-id="${coin.id}" data-name="${coin.name.toLowerCase()}">
                    <div class="card-header">
                        <div class="coin-name">
                            <h3>${coin.name || 'N/A'}</h3>
                            <span class="coin-symbol">${coin.symbol?.toUpperCase() || ''}</span>
                        </div>
                        <span class="coin-rank">#${coin.market_cap_rank || index+1}</span>
                    </div>
                    <div class="price-row">
                        <span class="current-price">$${formatPrice(coin.current_price)}</span>
                        <span class="change-badge ${isPositive ? 'positive' : 'negative'}">${changeFormatted}</span>
                    </div>
                    <div class="mini-chart">
                        <canvas id="${id}"></canvas>
                    </div>
                    <div class="card-footer">
                        <span class="market-cap">Κεφ. αγοράς: ${formatMarketCap(coin.market_cap)}</span>
                        <span>${coin.total_volume ? 'Όγκος: ' + formatMarketCap(coin.total_volume) : ''}</span>
                    </div>
                </div>
            `;
        }

        // ---------- ΑΠΟΔΟΣΗ GRID ----------
        function renderCards(data) {
            const searchTerm = searchInput.value.trim().toLowerCase();
            let filtered = data;
            if (searchTerm) {
                filtered = data.filter(coin => 
                    coin.name?.toLowerCase().includes(searchTerm) || 
                    coin.symbol?.toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">🔍 Δεν βρέθηκαν κρυπτονομίσματα με όρο "${searchInput.value}"</div>`;
                return;
            }

            // Κατασκευάζουμε HTML
            let html = '';
            filtered.forEach((coin, idx) => {
                html += buildCard(coin, idx);
            });
            grid.innerHTML = html;

            // Μετά την εισαγωγή στο DOM, δημισιουργούμε τα γραφήματα
            filtered.forEach((coin, idx) => {
                const canvasId = `chart-${coin.id || idx}`;
                const change = coin.price_change_percentage_24h ?? 0;
                let prices = [];
                if (coin.sparkline_in_7d && coin.sparkline_in_7d.price && Array.isArray(coin.sparkline_in_7d.price)) {
                    prices = coin.sparkline_in_7d.price.slice(-25);
                } else {
                    // συνθετικά σημεία
                    const basePrice = coin.current_price || 100;
                    const points = 20;
                    const trend = (change / 100) * 0.8;
                    for (let i = 0; i < points; i++) {
                        const noise = (Math.random() - 0.5) * 2;
                        const val = basePrice * (1 + (i / points) * trend + noise * 0.01);
                        prices.push(val);
                    }
                }
                if (prices.length < 2) prices = [100, 101];
                renderMiniChart(canvasId, prices, change);
            });
        }

        // ---------- ΛΗΨΗ ΔΕΔΟΜΕΝΩΝ ΑΠΟ COINGECKO ----------
        async function fetchCryptoData() {
            try {
                const url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1&sparkline=true&price_change_percentage=24h';
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) throw new Error('Empty data');

                cryptoData = data;

                // Ενημέρωση χρόνου
                const now = new Date();
                lastUpdateLabel.textContent = `τελευταία ενημέρωση: ${now.toLocaleTimeString('el-GR')}`;

                renderCards(cryptoData);
                return data;
            } catch (error) {
                console.error('Σφάλμα λήψης:', error);
                grid.innerHTML = `<div class="no-results">⚠️ Σφάλμα φόρτωσης δεδομένων. Δοκιμάστε ξανά ή ελέγξτε το δίκτυο.</div>`;
                return null;
            }
        }

        // ---------- ΑΡΧΙΚΗ ΦΟΡΤΩΣΗ & AUTO REFRESH ----------
        let refreshInterval = null;

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (cryptoData.length > 0) {
                    fetchCryptoData();
                } else {
                    // αν δεν υπάρχουν δεδομένα, κάνουμε fetch
                    fetchCryptoData();
                }
            }, 15000); // κάθε 15 δευτερόλεπτα
        }

        // Φόρτωση σελίδας
        window.addEventListener('load', () => {
            fetchCryptoData().then(() => {
                startAutoRefresh();
            });
        });

        // Ανανέωση με το κουμπί
        refreshBtn.addEventListener('click', () => {
            fetchCryptoData();
        });

        // Αναζήτηση με φιλτράρισμα (real-time)
        searchInput.addEventListener('input', () => {
            if (cryptoData.length > 0) {
                renderCards(cryptoData);
            }
        });

        // Αναδημιουργία γραφημάτων σε resize / αλλαγές (απλή επαναφορά)
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (cryptoData.length > 0) {
                    renderCards(cryptoData);
                }
            }, 300);
        });

        // Καθαρισμός interval όταν φεύγει η σελίδα (καλή πρακτική)
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });

    })();
</script>
</body>
</html>
