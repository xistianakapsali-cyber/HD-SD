<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Δοκιμή Αντιγραφής Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f4f4f9;
        }
        .movie-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 420px;
            margin: 0 auto;
        }
        .btn-main {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
            width: 90px;
        }
        .mobile-notice {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 10px;
            border: 1px solid #ffeeba;
            text-align: left;
        }
        .link-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #eee;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            word-break: break-all;
            margin-top: 8px;
            border: 1px solid #ddd;
        }
        .btn-copy {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
            white-space: nowrap;
        }
        .btn-copy:active {
            background: #1e7e34;
        }
    </style>
</head>
<body>

    <div class="movie-container">
        <h2>🎬 Δοκιμαστική Ταινία</h2>
        
        <!-- Κουμπί που ανοίγει το TeraBox (δουλεύει άψογα σε PC) -->
        <a href="https://terabox.com" target="_blank" class="btn-main">
            Μετάβαση
        </a>

        <!-- Το κουτάκι με το ολόγραφο link και την αυτόματη αντιγραφή για κινητά -->
        <div class="mobile-notice">
            📱 <b>Για χρήστες από κινητό:</b> Αν η εφαρμογή TeraBox κολλάει ή βγάζει σφάλμα, πατήστε το πράσινο κουμπί «Αντιγραφή», ανοίξτε την εφαρμογή TeraBox στο κινητό σας και η ταινία θα ξεκινήσει αμέσως!
            
            <div class="link-box">
                <span id="movieLink">https://terabox.com</span>
                <button class="btn-copy" onclick="copyLink()">Αντιγραφή</button>
            </div>
        </div>
    </div>

    <script>
    function copyLink() {
        // Παίρνουμε το link ολογράφως
        const linkText = document.getElementById("movieLink").innerText;
        
        // Χρήση του επίσημου API του browser για αντιγραφή
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(linkText).then(() => {
                alert("📋 Το link αντιγράφηκε! Ανοίξτε τώρα την εφαρμογή TeraBox.");
            }).catch(err => {
                fallbackCopy(linkText);
            });
        } else {
            // Εναλλακτικός τρόπος για πολύ παλιά κινητά
            fallbackCopy(linkText);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert("📋 Το link αντιγράφηκε! Ανοίξτε τώρα την εφαρμογή TeraBox.");
        } catch (err) {
            alert("Κρατήστε πατημένο το link για να το αντιγράψετε χειροκίνητα.");
        }
        document.body.removeChild(textArea);
    }
    </script>

</body>
</html>
