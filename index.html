<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Δοκιμή TeraBox Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f4f4f9;
        }
        .btn {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>

    <h2>Δοκιμαστικό Κουμπί Ταινίας</h2>
    <p>Πατήστε το παρακάτω κουμπί για να ελέγξουμε αν ανοίγει σωστά η ταινία.</p>
    
    <!-- Το πραγματικό σου link αλλά διορθωμένο σε .com -->
    <button class="btn" onclick="openMovie('https://terabox.com')">
        🎬 Αναπαραγωγή Ταινίας
    </button>

    <script>
    function openMovie(originalLink) {
        // Αν ο χρήστης είναι από κινητό, τον στέλνουμε σε μια ειδική διεύθυνση
        // που αναγκάζει τον browser να συμπεριφερθεί σαν υπολογιστής (Desktop Request)
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        
        if (isMobile) {
            // Αντικαθιστούμε το www με το d. ή το m. για να προσπεράσουμε το app redirect
            let desktopLink = originalLink.replace("www.terabox.com", "1024terabox.com");
            
            // Ανοίγουμε την ταινία σε νέα καρτέλα
            window.open(desktopLink, '_blank');
            return;
        }
        
        // Αν είναι από PC, ανοίγει κανονικά
        window.location.href = originalLink;
    }
    </script>

</body>
</html>
