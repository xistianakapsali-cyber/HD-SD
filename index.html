<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Δοκιμή Αντιγραφής Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f4f4f9;
        }
        .movie-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px; /* Μεγάλωσε το πλαίσιο για να χωράει το link */
            margin: 0 auto;
        }
        .btn-main {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }
        .btn-main:hover {
            background-color: #0052a3;
        }
        .mobile-notice {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 10px;
            border: 1px solid #ffeeba;
            text-align: left;
        }
        .link-box {
            display: flex;
            flex-direction: column; /* Το link και το κουμπί μπαίνουν σε ξεχωριστές γραμμές αν δεν χωράνε */
            gap: 10px;
            background: #eee;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            word-break: break-all; /* Αναγκάζει το μεγάλο link να αλλάξει γραμμή και να μην κρύβεται */
            margin-top: 10px;
            border: 1px solid #ddd;
        }
        @media (min-width: 480px) {
            .link-box {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }
        .movie-url {
            font-weight: bold;
            color: #333;
            user-select: all; /* Επιτρέπει στον χρήστη να το επιλέξει εύκολα και χειροκίνητα */
        }
        .btn-copy {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            width: 100%;
        }
        @media (min-width: 480px) {
            .btn-copy {
                width: auto;
            }
        }
        .btn-copy:active {
            background: #1e7e34;
        }
    </style>
</head>
<body>

    <div class="movie-container">
        <h2>🎬 Δοκιμαστική Ταινία</h2>
        
        <!-- Κουμπί Μετάβασης για PC -->
        <a href="https://terabox.com" target="_blank" class="btn-main">
            Μετάβαση στο TeraBox
        </a>

        <!-- Το διορθωμένο παράθυρο για τα κινητά -->
        <div class="mobile-notice">
            📱 <b>Για χρήστες από κινητό:</b> Αν η εφαρμογή TeraBox κολλάει ή βγάζει σφάλμα, πατήστε το πράσινο κουμπί «Αντιγραφή», ανοίξτε την εφαρμογή TeraBox στο κινητό σας και η ταινία θα ξεκινήσει αμέσως!
            
            <div class="link-box">
                <!-- Εδώ φαίνεται πλέον ΟΛΟΚΛΗΡΟ το πραγματικό link και το ID της ταινίας -->
                <span id="movieLink" class="movie-url">https://terabox.com</span>
                <button class="btn-copy" onclick="copyLink()">Αντιγραφή</button>
            </div>
        </div>
    </div>

    <script>
    function copyLink() {
        // Παίρνουμε το link ολογράφως
        const linkText = document.getElementById("movieLink").innerText;
        
        // Σωστή αντιγραφή στο πρόχειρο
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(linkText).then(() => {
                alert("📋 Το link αντιγράφηκε επιτυχώς! Ανοίξτε τώρα την εφαρμογή TeraBox.");
            }).catch(err => {
                fallbackCopy(linkText);
            });
        } else {
            fallbackCopy(linkText);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert("📋 Το link αντιγράφηκε επιτυχώς! Ανοίξτε τώρα την εφαρμογή TeraBox.");
        } catch (err) {
            alert("Παρακαλώ αντιγράψτε το link χειροκίνητα κρατώντας το πατημένο.");
        }
        document.body.removeChild(textArea);
    }
    </script>

</body>
</html>
