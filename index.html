<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ζωντανό Χαρτοφυλάκιο 50 Κρυπτονομισμάτων</title>
    <!-- Font Awesome, Google Fonts, Chart.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f8fafd;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .main-container {
            max-width: 1440px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,20,50,0.06);
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area i {
            font-size: 28px;
            color: #0055ff;
        }
        .logo-area h1 {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.4px;
            color: #0b1e3a;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .live-badge {
            background: #eef5ff;
            color: #0055ff;
            font-weight: 600;
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulseGlow 1.8s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.7; box-shadow: 0 0 0 0 rgba(0, 85, 255, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 12px 4px rgba(0, 85, 255, 0.15); }
            100% { opacity: 0.7; box-shadow: 0 0 0 0 rgba(0, 85, 255, 0.2); }
        }
        .live-badge i {
            font-size: 12px;
            color: #00c853;
        }
        .btn-hist {
            background: #f0f4fe;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            color: #0b1e3a;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-hist:hover {
            background: #dce6fd;
        }
        .btn-hist i {
            color: #0055ff;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: modalFade 0.25s ease;
        }
        @keyframes modalFade {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-box h3 {
            font-weight: 600;
            font-size: 20px;
            color: #0b1e3a;
            margin-bottom: 16px;
        }
        .modal-box .hist-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #edf2f8;
            font-size: 15px;
        }
        .modal-box .hist-item:last-child {
            border-bottom: none;
        }
        .modal-box .hist-date {
            font-weight: 500;
            color: #1b2b44;
        }
        .modal-box .hist-price {
            font-weight: 600;
            color: #0b1e3a;
        }
        .modal-close {
            margin-top: 20px;
            background: #f0f4fe;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 500;
            color: #0b1e3a;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: #dce6fd;
        }
        .portfolio-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 28px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .portfolio-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .portfolio-left h2 {
            font-weight: 500;
            font-size: 18px;
            color: #1b2b44;
        }
        .portfolio-left .value {
            font-weight: 700;
            font-size: 36px;
            letter-spacing: -0.5px;
            color: #0b1e3a;
        }
        .portfolio-left .change {
            font-weight: 600;
            font-size: 20px;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .change.positive { background: #e6f9ed; color: #0f7b3a; }
        .change.negative { background: #ffedf0; color: #c42b3d; }
        .portfolio-right {
            display: flex;
            gap: 18px;
            align-items: center;
            color: #3c4d6b;
        }
        .portfolio-right i {
            font-size: 20px;
            color: #0055ff;
        }
        .portfolio-right span {
            font-weight: 500;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            gap: 24px;
        }
        @media (max-width: 1000px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }
        .table-wrapper {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.02);
            border: 1px solid #edf2f9;
            overflow: hidden;
            padding: 8px 0;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            padding: 16px 20px 8px 20px;
            border-bottom: 1px solid #eef2f8;
            font-weight: 600;
            color: #3a4d6b;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .table-scroll {
            max-height: 460px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d0d9e6 #f0f4fc;
        }
        .table-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: #f0f4fc;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e3;
            border-radius: 12px;
        }
        .crypto-row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1.2fr 0.8fr;
            padding: 10px 20px;
            align-items: center;
            border-bottom: 1px solid #f2f6fd;
            font-size: 14px;
            transition: background 0.1s ease;
        }
        .crypto-row:hover {
            background: #f9fcff;
        }
        .crypto-row .name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #0b1e3a;
        }
        .crypto-row .name i {
            font-size: 18px;
            color: #3a5a8a;
            width: 24px;
            text-align: center;
        }
        .crypto-row .price {
            font-weight: 500;
            color: #1b2b44;
        }
        .crypto-row .change-badge {
            font-weight: 600;
            padding: 4px 0;
            border-radius: 30px;
            text-align: center;
        }
        .change-badge.up { color: #0f7b3a; background: #e6f9ed; }
        .change-badge.down { color: #c42b3d; background: #ffedf0; }
        .crypto-row .holdings {
            font-weight: 500;
            color: #1b2b44;
            text-align: right;
        }
        .portfolio-detail {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #edf2f9;
            padding: 20px 22px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            height: fit-content;
        }
        .owner-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
            border-bottom: 1px solid #eef2f8;
            padding-bottom: 10px;
        }
        .owner-name {
            font-weight: 700;
            font-size: 20px;
            color: #0b1e3a;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .owner-name small {
            font-weight: 400;
            font-size: 13px;
            color: #5a6f8c;
            margin-left: 6px;
        }
        .owner-period {
            font-size: 13px;
            color: #5a6f8c;
            font-weight: 400;
            margin-top: 2px;
        }
        .guarantor {
            font-size: 14px;
            color: #2b3f5e;
            font-weight: 500;
            margin-top: 2px;
        }
        .guarantor i {
            color: #0055ff;
            margin-right: 6px;
        }
        .detail-total {
            display: flex;
            align-items: baseline;
            gap: 16px;
            padding: 10px 0 14px 0;
            border-bottom: 1px solid #eef2f8;
            margin-bottom: 12px;
        }
        .detail-total .big-value {
            font-weight: 700;
            font-size: 36px;
            color: #0b1e3a;
        }
        .detail-total .big-change {
            font-weight: 600;
            font-size: 20px;
        }
        .position-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .position-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f2f6fd;
            font-size: 13px;
        }
        .position-item .sym {
            font-weight: 500;
            color: #1b2b44;
        }
        .position-item .pos-value {
            font-weight: 500;
            color: #0b1e3a;
        }
        .position-item .pos-change {
            font-weight: 500;
            min-width: 60px;
            text-align: right;
        }
        .pos-change.up { color: #0f7b3a; }
        .pos-change.down { color: #c42b3d; }
        .chart-wrapper {
            margin-top: 16px;
            border-top: 1px solid #eef2f8;
            padding-top: 16px;
        }
        .chart-wrapper canvas {
            width: 100% !important;
            height: 60px !important;
        }
        .footer-note {
            margin-top: 12px;
            font-size: 12px;
            color: #6f7f99;
            text-align: center;
            border-top: 1px solid #edf2f8;
            padding-top: 12px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="header">
        <div class="logo-area">
            <i class="fas fa-coins"></i>
            <h1>50 Crypto · Live</h1>
        </div>
        <div class="header-actions">
            <button class="btn-hist" id="btnLow"><i class="fas fa-arrow-down"></i> Ιστορικό Χαμηλό</button>
            <button class="btn-hist" id="btnHigh"><i class="fas fa-arrow-up"></i> Ιστορικό Ανώτερο</button>
            <div class="live-badge">
                <i class="fas fa-circle"></i> Ζωντανά
            </div>
        </div>
    </div>

    <div class="portfolio-card" id="portfolioSummary">
        <div class="portfolio-left">
            <h2><i class="fas fa-wallet" style="margin-right: 10px;"></i>Χαρτοφυλάκιο</h2>
            <span class="value" id="totalValue">2.500,00</span>
            <span class="change" id="totalChange">+0,00%</span>
        </div>
        <div class="portfolio-right">
            <i class="fas fa-arrow-up"></i>
            <span>50 θέσεις</span>
            <i class="fas fa-chevron-right" style="font-size: 14px;"></i>
        </div>
    </div>

    <div class="grid-2col">
        <div class="table-wrapper">
            <div class="table-header">
                <span>Όνομα</span>
                <span>Τιμή (€)</span>
                <span>24h %</span>
                <span>Θέση (€)</span>
            </div>
            <div class="table-scroll" id="cryptoTable"></div>
        </div>

        <div class="portfolio-detail" id="portfolioDetail">
            <div class="owner-header">
                <div class="owner-name">
                    <i class="fas fa-user-circle" style="color: #0055ff;"></i> Νίκος Παπαδόπουλος
                    <small>Δικαιούχος</small>
                </div>
                <div class="guarantor"><i class="fas fa-shield-alt"></i> Νίκος Παπαζήσης — Εγγυητής Χαρτοφυλακείου</div>
                <div class="owner-period"><i class="far fa-calendar-alt" style="margin-right: 6px;"></i>15 Απριλίου 2026 – 15 Απριλίου 2027</div>
            </div>
            <div class="detail-total">
                <span class="big-value" id="detailTotalValue">2.500,00</span>
                <span class="big-change" id="detailTotalChange">+0,00%</span>
            </div>
            <div class="position-list" id="positionList"></div>
            <div class="chart-wrapper">
                <canvas id="liveChart"></canvas>
            </div>
            <div class="footer-note">
                <i class="fas fa-sync-alt fa-fw"></i> Ενημέρωση κάθε 2 δευτ. · Προσομοίωση αγοράς
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="historyModal">
    <div class="modal-box">
        <h3 id="modalTitle">Ιστορικό</h3>
        <div id="modalBody"></div>
        <button class="modal-close" id="modalClose">Κλείσιμο</button>
    </div>
</div>

<script>
    (function() {
        // ---- 50 κρυπτο ----
        const CRYPTO_SYMBOLS = [
            "BTC","ETH","BNB","XRP","ADA","SOL","DOGE","DOT","MATIC","SHIB",
            "AVAX","LINK","UNI","ATOM","LTC","ETC","FIL","ICP","NEAR","VET",
            "ALGO","FTM","EGLD","THETA","SAND","MANA","AAVE","EOS","XTZ","GALA",
            "FLOW","KLAY","XMR","HBAR","QNT","ZEC","BTT","HOT","AMP","1INCH",
            "ENJ","CHZ","CRV","ZIL","ANKR","BAT","OCEAN","REN","SKALE"
        ];
        const SYMBOLS = CRYPTO_SYMBOLS.slice(0, 50);
        const FULL_NAMES = {
            BTC:"Bitcoin", ETH:"Ethereum", BNB:"BNB", XRP:"XRP", ADA:"Cardano",
            SOL:"Solana", DOGE:"Dogecoin", DOT:"Polkadot", MATIC:"Polygon", SHIB:"Shiba Inu",
            AVAX:"Avalanche", LINK:"Chainlink", UNI:"Uniswap", ATOM:"Cosmos", LTC:"Litecoin",
            ETC:"Ethereum Classic", FIL:"Filecoin", ICP:"Internet Computer", NEAR:"NEAR", VET:"VeChain",
            ALGO:"Algorand", FTM:"Fantom", EGLD:"Elrond", THETA:"Theta", SAND:"The Sandbox",
            MANA:"Decentraland", AAVE:"Aave", EOS:"EOS", XTZ:"Tezos", GALA:"Gala",
            FLOW:"Flow", KLAY:"Klaytn", XMR:"Monero", HBAR:"Hedera", QNT:"Quant",
            ZEC:"Zcash", BTT:"BitTorrent", HOT:"Holo", AMP:"AMP", "1INCH":"1inch",
            ENJ:"Enjin", CHZ:"Chiliz", CRV:"Curve", ZIL:"Zilliqa", ANKR:"Ankr",
            BAT:"Basic Attention", OCEAN:"Ocean", REN:"Ren", SKALE:"Skale"
        };
        const BASE_PRICES = [
            34000, 1800, 320, 0.5, 0.4, 25, 0.08, 5, 0.8, 0.00001,
            15, 7, 5, 8, 70, 20, 4, 7, 3, 0.02,
            0.2, 0.3, 45, 1.2, 0.4, 0.5, 70, 1.1, 0.8, 0.03,
            1.2, 0.2, 160, 0.07, 110, 30, 0.0005, 0.002, 0.005, 0.3,
            0.2, 0.1, 0.5, 0.03, 0.04, 0.2, 0.3, 0.4, 0.08, 0.05
        ];

        let initialHoldings = [];
        let initialTotal = 0;
        const TARGET = 2500;
        for (let i=0; i<SYMBOLS.length; i++) {
            let price = BASE_PRICES[i % BASE_PRICES.length];
            let qty = 50 / price;
            initialHoldings.push(qty);
            initialTotal += qty * price;
        }
        let scale = TARGET / initialTotal;
        for (let i=0; i<initialHoldings.length; i++) {
            initialHoldings[i] = initialHoldings[i] * scale;
        }

        let currentPrices = [];
        let currentHoldings = [...initialHoldings];
        let previousTotal = 0;

        function initPrices() {
            for (let i=0; i<SYMBOLS.length; i++) {
                let base = BASE_PRICES[i % BASE_PRICES.length];
                let variation = 1 + (Math.random() * 0.08 - 0.04);
                currentPrices.push(base * variation);
            }
        }
        initPrices();

        function calcTotal() {
            let sum = 0;
            for (let i=0; i<SYMBOLS.length; i++) {
                sum += currentHoldings[i] * currentPrices[i];
            }
            return sum;
        }
        let totalPortfolio = calcTotal();
        previousTotal = totalPortfolio;

        let oldPrices = [...currentPrices];

        // ---- Chart.js ----
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chartData = {
            labels: [],
            datasets: [{
                label: 'Σύνολο (€)',
                data: [],
                borderColor: '#0055ff',
                backgroundColor: 'rgba(0, 85, 255, 0.08)',
                borderWidth: 2.5,
                pointRadius: 0,
                tension: 0.2,
                fill: true,
            }]
        };
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { display: false, beginAtZero: false }
                },
                animation: { duration: 200 }
            }
        });
        for (let i=0; i<20; i++) {
            let val = 2500 + (Math.random() * 60 - 30);
            chartData.labels.push(i);
            chartData.datasets[0].data.push(val);
        }
        liveChart.update();

        // ---- render ----
        function renderAll() {
            let total = calcTotal();
            let changePercent = previousTotal !== 0 ? ((total - previousTotal) / previousTotal * 100) : 0;
            document.getElementById('totalValue').innerText = total.toFixed(2);
            document.getElementById('detailTotalValue').innerText = total.toFixed(2);
            let changeEl = document.getElementById('totalChange');
            let detailChangeEl = document.getElementById('detailTotalChange');
            let sign = changePercent >= 0 ? '+' : '';
            changeEl.innerText = `${sign}${changePercent.toFixed(2)}%`;
            detailChangeEl.innerText = `${sign}${changePercent.toFixed(2)}%`;
            changeEl.className = `change ${changePercent >= 0 ? 'positive' : 'negative'}`;
            detailChangeEl.className = `big-change ${changePercent >= 0 ? 'positive' : 'negative'}`;

            let tableHtml = '';
            for (let i=0; i<SYMBOLS.length; i++) {
                let sym = SYMBOLS[i];
                let name = FULL_NAMES[sym] || sym;
                let price = currentPrices[i];
                let oldPrice = oldPrices[i] || price;
                let change = oldPrice !== 0 ? ((price - oldPrice) / oldPrice * 100) : 0;
                let changeClass = change >= 0 ? 'up' : 'down';
                let changeSign = change >= 0 ? '+' : '';
                let formattedChange = `${changeSign}${change.toFixed(2)}%`;
                let holdingValue = currentHoldings[i] * price;
                tableHtml += `
                    <div class="crypto-row" data-sym="${sym}">
                        <div class="name"><i class="fas fa-circle" style="font-size: 10px; color: ${change>=0?'#0f7b3a':'#c42b3d'};"></i> ${name} (${sym})</div>
                        <div class="price">${price.toFixed(4)}</div>
                        <div class="change-badge ${changeClass}">${formattedChange}</div>
                        <div class="holdings">${holdingValue.toFixed(2)}</div>
                    </div>
                `;
            }
            document.getElementById('cryptoTable').innerHTML = tableHtml;

            let posHtml = '';
            for (let i=0; i<SYMBOLS.length; i++) {
                let sym = SYMBOLS[i];
                let price = currentPrices[i];
                let holdingValue = currentHoldings[i] * price;
                let oldPrice = oldPrices[i] || price;
                let change = oldPrice !== 0 ? ((price - oldPrice) / oldPrice * 100) : 0;
                let changeClass = change >= 0 ? 'up' : 'down';
                let changeSign = change >= 0 ? '+' : '';
                posHtml += `
                    <div class="position-item">
                        <span class="sym">${sym}</span>
                        <span class="pos-value">${holdingValue.toFixed(2)}€</span>
                        <span class="pos-change ${changeClass}">${changeSign}${change.toFixed(2)}%</span>
                    </div>
                `;
            }
            document.getElementById('positionList').innerHTML = posHtml;

            let currentVal = total;
            chartData.datasets[0].data.push(currentVal);
            if (chartData.datasets[0].data.length > 40) {
                chartData.datasets[0].data.shift();
                chartData.labels.shift();
            }
            chartData.labels.push(chartData.labels.length);
            liveChart.update();

            previousTotal = total;
            oldPrices = [...currentPrices];
        }

        function updatePrices() {
            for (let i=0; i<currentPrices.length; i++) {
                let change = (Math.random() * 2.4 - 1.2) / 100;
                let newPrice = currentPrices[i] * (1 + change);
                if (newPrice < 0.0001) newPrice = 0.0001;
                currentPrices[i] = newPrice;
            }
            renderAll();
        }

        renderAll();
        setInterval(updatePrices, 2000);

        // ---- Modal ----
        const modal = document.getElementById('historyModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        function openModal(title, items) {
            modalTitle.innerText = title;
            let html = '';
            items.forEach(item => {
                html += `<div class="hist-item"><span class="hist-date">${item.date}</span><span class="hist-price">${item.price}</span></div>`;
            });
            modalBody.innerHTML = html;
            modal.classList.add('active');
        }

        // Ιστορικό Χαμηλό: μόνο το χαμηλό (2.510)
        document.getElementById('btnLow').addEventListener('click', function() {
            openModal('Ιστορικό Χαμηλό', [
                { date: '25/04/2026', price: '⬇ 2.510 €' }
            ]);
        });

        // Ιστορικό Ανώτερο: μόνο το ανώτερο (3.820)
        document.getElementById('btnHigh').addEventListener('click', function() {
            openModal('Ιστορικό Ανώτερο', [
                { date: '20/05/2026', price: '⬆ 3.820 €' }
            ]);
        });

        modalClose.addEventListener('click', function() {
            modal.classList.remove('active');
        });
        modal.addEventListener('click', function(e) {
            if (e.target === modal) modal.classList.remove('active');
        });
    })();
</script>
