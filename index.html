<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Δοκιμή TeraBox Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f4f4f9;
        }
        .btn {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>

    <h2>Δοκιμαστικό Κουμπί Ταινίας</h2>
    <p>Πατήστε το παρακάτω κουμπί για να ελέγξουμε αν ανοίγει σωστά η ταινία μέσα στην εφαρμογή TeraBox.</p>
    
    <!-- Εδώ είναι το δικό σου πραγματικό link -->
    <button class="btn" onclick="openMovie('https://terabox.app')">
        🎬 Αναπαραγωγή Ταινίας
    </button>

    <script>
    function openMovie(originalLink) {
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        
        if (isMobile) {
            // Απομονώνουμε το ID της ταινίας (το κομμάτι μετά το surl=)
            const urlParts = originalLink.split('surl=');
            if (urlParts.length > 1) {
                const surlId = urlParts[1]; 
                
                // ΝΕΑ ΔΙΟΡΘΩΜΕΝΗ ΕΝΤΟΛΗ: Στέλνει το πλήρες link δομημένο για την εφαρμογή
                const appScheme = `terabox://www.terabox.app/sharing/link?surl=${surlId}`;
                
                window.location.href = appScheme;
                return;
            }
        }
        
        // Αν είναι από PC, ανοίγει κανονικά στον browser
        window.location.href = originalLink;
    }
    </script>

</body>
</html>
