<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Η Σελίδα των Ταινιών μου</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f4f4f9;
        }
        .movie-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        .btn-main {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }
        .mobile-notice {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 10px;
            border: 1px solid #ffeeba;
        }
        .link-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #eee;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 5px;
        }
        .btn-copy {
            background: #28a745;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="movie-container">
        <h3>🎬 Όνομα Ταινίας</h3>
        
        <!-- Κουμπί για Laptop/PC που παίζει απευθείας -->
        <a href="https://terabox.com" target="_blank" class="btn-main">
            Μετάβαση στο TeraBox
        </a>

        <!-- Το έξυπνο κουτάκι για τα κινητά -->
        <div class="mobile-notice">
            📱 <b>Για κινητά:</b> Αν κολλάει το παραπάνω κουμπί, αντιγράψτε το link και ανοίξτε την εφαρμογή TeraBox.
            
            <div class="link-box">
                <span id="movieLink">https://terabox.com</span>
                <button class="btn-copy" onclick="copyLink()">Αντιγραφή</button>
            </div>
        </div>
    </div>

    <script>
    function copyLink() {
        // Παίρνουμε το κείμενο του link
        const linkText = document.getElementById("movieLink").innerText;
        
        // Το αντιγράφουμε στο πρόχειρο (clipboard) του κινητού
        navigator.clipboard.writeText(linkText).then(() => {
            alert("📋 Το link αντιγράφηκε! Ανοίξτε τώρα την εφαρμογή TeraBox.");
        }).catch(err => {
            alert("Αποτυχία αντιγραφής, παρακαλώ αντιγράψτε το χειροκίνητα.");
        });
    }
    </script>

</body>
</html>
